<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Place Your Order | Ramadan Kareem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('./assets/images/12.jpg') center/cover no-repeat;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            padding-top: 70px;
        }

        .form-container {
            max-width: 600px;
            margin: 80px auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid gold;
        }

        h2 {
            color: gold;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-label {
            color: #fff;
        }

        .form-control,
        .form-select {
            background: #111;
            color: #fff;
            border: 1px solid gold;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: orange;
            box-shadow: 0 0 5px gold;
        }

        .btn-order {
            background: gold;
            color: #111;
            font-weight: 600;
            width: 100%;
        }

        .btn-order:hover {
            background: darkorange;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Place Your Order</h2>
        <form id="orderForm">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" id="customerName" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" id="customerPhone" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" id="customerAddress" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Meal Type</label>
                <select class="form-select" id="mealType" required>
                    <option value="" disabled selected>Select Meal Type</option>
                    <option>Iftar Meal</option>
                    <option>Suhoor Meal</option>
                    <option>Dessert / Drink</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Meal Name</label>
                <input type="text" class="form-control" id="mealName" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" class="form-control" id="mealPrice" required>
            </div>
            <button type="submit" class="btn btn-order">Submit Order</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('orderForm');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const orderData = {
                name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                address: document.getElementById('customerAddress').value,
                mealType: document.getElementById('mealType').value,
                mealName: document.getElementById('mealName').value,
                price: document.getElementById('mealPrice').value
            };

            console.log('Order Submitted:', orderData);

            // حفظ في LocalStorage
            localStorage.setItem('latestOrder', JSON.stringify(orderData));

            // تحويل لصفحة orders.html
            window.location.href = 'orders.html';
        });
    </script>

</body>

</html>
