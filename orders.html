<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders | Ramadan Kareem</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style> 
body{background:#111;color:#fff;font-family:'Cairo',sans-serif;padding:50px;}
h2{color:gold;text-align:center;margin-bottom:30px;}
.order-card{background:#222;border:1px solid gold;padding:20px;border-radius:10px;margin-bottom:20px;}
</style>
</head>
<body>

<h2>Latest Order</h2>
<div id="orderContainer"></div>

<script>
const orderContainer = document.getElementById('orderContainer');

// قراءة بيانات الطلب من LocalStorage
const orderData = JSON.parse(localStorage.getItem('latestOrder'));

if(orderData){
    const card = document.createElement('div');
    card.classList.add('order-card');
    card.innerHTML = `
        <p><strong>Name:</strong> ${orderData.name}</p>
        <p><strong>Phone:</strong> ${orderData.phone}</p>
        <p><strong>Address:</strong> ${orderData.address}</p>
        <p><strong>Meal Type:</strong> ${orderData.mealType}</p>
        <p><strong>Meal Name:</strong> ${orderData.mealName}</p>
        <p><strong>Price:</strong> $${orderData.price}</p>
    `;
    orderContainer.appendChild(card);
}else{
    orderContainer.innerHTML = "<p>No order found.</p>";
}
</script>

</body>
</html>
